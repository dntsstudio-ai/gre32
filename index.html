<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Wave Studio — Профессиональная озвучка и дубляж</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0b0d; --card-bg: #141417; --input-bg: #050506;
            --accent: #ff2e2e; --text: #ffffff; --text-dim: #9ca3af;
            --border: #252529; --admin: #3897f0; --ts: all 0.2s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background-color: var(--bg); 
            background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='30' y='50' fill='rgba(255,46,46,0.06)' font-weight='bold' font-size='32' font-family='sans-serif'%3EX%3C/text%3E%3Ctext x='120' y='120' fill='rgba(255,46,46,0.06)' font-weight='bold' font-size='32' font-family='sans-serif'%3EO%3C/text%3E%3Ctext x='60' y='170' fill='rgba(255,46,46,0.06)' font-weight='bold' font-size='22' font-family='sans-serif'%3ESWS%3C/text%3E%3C/svg%3E");
            color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; 
        }
        .container { max-width: 1100px; margin: 0 auto; width: 100%; padding: 0 15px; flex: 1; position: relative; z-index: 2; }
        header { background: rgba(11, 11, 13, 0.95); backdrop-filter: blur(12px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 1.2rem; }
        .logo span { color: var(--accent); }
        .nav-link { color: var(--text-dim); text-decoration: none; font-weight: 700; font-size: 13px; padding: 8px 10px; cursor: pointer; transition: var(--ts); }
        .nav-link:hover { color: white; }
        .nav-link.active { color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); position: relative; transition: var(--ts); cursor: pointer; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-3px); border-color: #444; }
        .card img { width: 100%; height: 250px; object-fit: cover; pointer-events: none; }
        .card-info { padding: 12px; font-size: 13px; flex: 1; pointer-events: none; }
        .adm-tools { position: absolute; top: 5px; right: 5px; display: flex; gap: 5px; z-index: 10; }
        .btn-sm { padding: 4px 8px; font-size: 10px; border-radius: 4px; border: none; cursor: pointer; color: white; font-weight: bold; }
        .btn-red { background: var(--accent); }
        
        /* Анимация кнопок серий */
        .ep-btn { padding: 10px 15px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: white; cursor: pointer; transition: var(--ts); white-space: nowrap; }
        .ep-btn:hover { background: rgba(255,255,255,0.05); }
        .ep-btn.active { background: var(--accent); border-color: var(--accent); font-weight: bold; box-shadow: 0 0 10px rgba(255,46,46,0.3); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 15px; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 500px; padding: 25px; border-radius: 16px; border: 1px solid var(--border); position: relative; }
        input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 10px; outline: none; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; background: var(--accent); color: white; font-weight: 700; cursor: pointer; transition: var(--ts); width: 100%; margin-top: 5px; }
        .btn-outline { background: transparent; border: 1px solid var(--border); }
        
        #user-ui { background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
        .profile-header { display: flex; gap: 20px; align-items: center; margin-bottom: 20px; }
        .profile-header img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        
        .team-container { margin-bottom: 30px; }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; min-height: 50px; }
        .dragging { opacity: 0.5; transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="toast-container" style="position:fixed; bottom:20px; right:20px; z-index:9999;"></div>
    <header>
        <div class="logo" onclick="navigate('home')">SOUND<span> WAVE</span> STUDIO</div>
        <nav>
            <a id="n-home" class="nav-link" onclick="navigate('home')">Релизы</a>
            <a id="n-team" class="nav-link" onclick="navigate('team')">Состав</a>
            <a id="n-profile" class="nav-link" onclick="navigate('profile')">Профиль</a>
        </nav>
    </header>

    <main class="container">
        <section id="home" class="section">
            <div style="display:flex; gap:10px; margin-bottom:20px; margin-top:20px;">
                <input type="text" id="main-search" placeholder="Поиск..." oninput="filterData()">
                <button id="adm-btn-rel" class="btn" style="display:none; width:auto;" onclick="openRelModal()">+ Добавить</button>
            </div>
            <div class="grid" id="main-grid"></div>
        </section>

        <section id="team" class="section">
            <h2 style="margin: 20px 0;">Команда проекта</h2>
            <div id="team-wrapper"></div>
            <button id="adm-btn-team" class="btn" style="display:none; max-width:200px;" onclick="openTeamModal()">+ Добавить участника</button>
        </section>

        <section id="profile" class="section">
            <div id="auth-ui" style="max-width:350px; margin: 50px auto; display:none;">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Пароль">
                <button class="btn" id="btn-login">Войти</button>
                <button class="btn btn-outline" id="btn-reg">Регистрация</button>
            </div>
            <div id="user-ui" style="display:none; margin-top:20px;">
                <div class="profile-header">
                    <img id="u-ava" src="">
                    <div>
                        <h2 id="u-nick"></h2>
                        <p id="u-role" style="color:var(--accent); font-weight:bold; font-size:12px;"></p>
                        <div style="display:flex; gap:15px; margin-top:10px;">
                            <span>👀 <b id="u-views">0</b></span>
                            <span style="cursor:pointer" onclick="showMySubscribers()">👥 <b id="u-subs">0</b></span>
                        </div>
                    </div>
                </div>
                <h4>Публичные достижения</h4>
                <div id="u-ach" style="display:flex; gap:10px; margin:15px 0; flex-wrap:wrap;"></div>
                <button class="btn btn-outline" onclick="openAchInventory()">Инвентарь достижений</button>
                <button class="btn btn-outline" id="btn-logout" style="color:var(--accent); border-color:var(--accent); margin-top:10px;">Выйти</button>
                
                <div id="adm-ach-panel" style="display:none; margin-top:20px; padding-top:20px; border-top:1px solid var(--border);">
                    <button class="btn" style="background:var(--admin)" onclick="document.getElementById('m-give-ach').style.display='flex'">Выдать ачивку</button>
                </div>
            </div>
        </section>

        <section id="view" class="section">
            <button class="btn btn-outline" style="width:auto; margin: 20px 0;" onclick="navigate('home')">← Назад</button>
            <div id="v-info"></div>
            <div id="v-ep-list" style="display:flex; gap:10px; overflow-x:auto; padding:10px 0;"></div>
            <div style="aspect-ratio:16/9; background:#000; border-radius:12px; overflow:hidden; margin:20px 0;">
                <iframe id="v-iframe" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
            </div>
        </section>
    </main>

    <footer style="text-align:center; padding:40px 0; border-top:1px solid var(--border);">
        <p onclick="openPrivacy()" style="cursor:pointer; color:var(--text-dim); font-size:12px;">© Sound Wave Studio. Политика конфиденциальности</p>
    </footer>

    <div id="m-rel" class="modal"><div class="modal-content">
        <h3>Релиз</h3>
        <input type="hidden" id="ed-rel-id"><input type="text" id="ad-title" placeholder="Название">
        <input type="text" id="ad-img" placeholder="URL постера"><textarea id="ad-desc" placeholder="Описание"></textarea>
        <button class="btn" onclick="saveRel()">Сохранить</button><button class="btn btn-outline" onclick="closeModals()">Отмена</button>
    </div></div>
    
    <div id="m-give-ach" class="modal"><div class="modal-content">
        <h3>Выдать ачивку</h3>
        <input type="text" id="ga-uid" placeholder="Email пользователя">
        <input type="text" id="ga-name" placeholder="Название">
        <input type="text" id="ga-desc" placeholder="Описание">
        <input type="text" id="ga-img" placeholder="Иконка (Эмодзи)">
        <button class="btn" onclick="giveAch()">Выдать</button>
        <button class="btn btn-outline" onclick="closeModals()">Отмена</button>
    </div></div>

    <div id="m-ach-inv" class="modal"><div class="modal-content" style="max-width:600px;">
        <h3>Ваш инвентарь</h3>
        <div id="ach-inv-list" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(80px, 1fr)); gap:10px; margin:20px 0;"></div>
        <button class="btn btn-outline" onclick="closeModals()">Закрыть</button>
    </div></div>

    <div id="m-ach-view" class="modal"><div class="modal-content" style="text-align:center;">
        <div id="ach-v-img" style="font-size:50px;"></div>
        <h2 id="ach-v-name"></h2>
        <p id="ach-v-desc" style="margin:15px 0; color:var(--text-dim);"></p>
        <div id="ach-v-meta" style="font-size:11px; margin-bottom:20px;"></div>
        <div style="display:grid; gap:10px;">
            <button id="btn-ach-toggle" class="btn">Скрыть из профиля</button>
            <button id="btn-ach-del" class="btn" style="background:red;">Удалить навсегда</button>
            <button class="btn btn-outline" onclick="closeModals()">Назад</button>
        </div>
    </div></div>

    <div id="m-privacy" class="modal"><div class="modal-content"><h3>Политика конфиденциальности</h3><p>Данные используются только для функционирования аккаунтов.</p><button class="btn btn-outline" onclick="closeModals()">Закрыть</button></div></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, getDoc, setDoc, updateDoc, deleteDoc, query, orderBy, where, increment, arrayUnion, arrayRemove, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, sendPasswordResetEmail, updatePassword, updateEmail } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD34TTNdG1V4SZmuQ1ULVdo3iBB3q-7pC8",
            authDomain: "my-dub-site.firebaseapp.com",
            projectId: "my-dub-site",
            storageBucket: "my-dub-site.firebasestorage.app",
            messagingSenderId: "302896869866",
            appId: "1:302896869866:web:a003a8f24d682cb3ac0293"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let isAdmin = false, userData = null, allRel = [], curProj = null;
        let draggedItemId = null;

        const esc = (s) => s ? s.toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : '';

        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast ${type}`; t.style = `background:${type==='success'?'#2ecc71':'#e74c3c'}; color:white; padding:10px 20px; border-radius:8px; margin-top:10px; font-size:13px; animation: slideIn 0.3s ease;`;
            t.innerHTML = msg; container.appendChild(t);
            setTimeout(() => { t.remove(); }, 3000);
        };

        window.navigate = (id, push = true) => {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            const target = document.getElementById(id);
            if(target) target.style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active');
            if(push) history.pushState({page: id}, "", "#" + id);
            if(id === 'home') loadHome();
            if(id === 'team') loadTeam();
        };

        window.closeModals = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        window.openPrivacy = () => document.getElementById('m-privacy').style.display = 'flex';

        // --- РЕЛИЗЫ ---
        async function loadHome() {
            const snap = await getDocs(query(collection(db, "projects"), orderBy("time", "desc")));
            allRel = snap.docs.map(d => ({id:d.id, ...d.data()}));
            filterData();
        }

        window.filterData = () => {
            const q = document.getElementById('main-search').value.toLowerCase();
            const grid = document.getElementById('main-grid'); grid.innerHTML = '';
            allRel.filter(p => p.title.toLowerCase().includes(q)).forEach(p => {
                grid.innerHTML += `
                <div class="card" onclick="viewProj('${p.id}')">
                    ${isAdmin ? `
                        <div class="adm-tools">
                            <button class="btn-sm btn-red" onclick="event.stopPropagation(); deleteRel('${p.id}')">УДАЛИТЬ</button>
                        </div>` : ''}
                    <img src="${p.img}">
                    <div class="card-info"><b>${esc(p.title)}</b></div>
                </div>`;
            });
        };

        window.deleteRel = async (id) => {
            if(confirm("Удалить релиз?")) { await deleteDoc(doc(db, "projects", id)); loadHome(); }
        };

        // --- ПЛЕЕР И СЕРИИ ---
        window.viewProj = async (id) => {
            const d = await getDoc(doc(db, "projects", id)); curProj = {id:d.id, ...d.data()};
            navigate('view');
            document.getElementById('v-info').innerHTML = `<h1>${esc(curProj.title)}</h1><p>${esc(curProj.desc)}</p>`;
            renderEpisodes();
        };

        function renderEpisodes() {
            const list = document.getElementById('v-ep-list'); list.innerHTML = '';
            const series = curProj.series || [];
            series.forEach((ep, i) => {
                const btn = document.createElement('button');
                btn.className = 'ep-btn';
                btn.id = `ep-btn-${i}`;
                btn.innerText = ep.name;
                btn.onclick = () => playEp(i);
                list.appendChild(btn);
            });
            if(series.length > 0) playEp(0);
        }

        window.playEp = (i) => {
            document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`ep-btn-${i}`);
            if(activeBtn) activeBtn.classList.add('active');
            
            let url = curProj.series[i].url;
            if(url.includes('youtube.com')) {
                const id = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
                url = `https://www.youtube.com/embed/${id}`;
            }
            document.getElementById('v-iframe').src = url;
        };

        // --- КОМАНДА (DRAG & DROP МЕСТАМИ) ---
        async function loadTeam() {
            const wrapper = document.getElementById('team-wrapper'); wrapper.innerHTML = '';
            const snap = await getDocs(query(collection(db, "team"), orderBy("index", "asc")));
            const members = snap.docs.map(d => ({id:d.id, ...d.data()}));

            const grid = document.createElement('div');
            grid.className = 'team-grid';
            members.forEach(m => {
                const el = document.createElement('div');
                el.className = 'card';
                el.draggable = isAdmin;
                el.dataset.id = m.id;
                el.innerHTML = `
                    ${isAdmin ? `<div class="adm-tools"><button class="btn-sm btn-red" onclick="event.stopPropagation(); deleteTM('${m.id}')">УДАЛИТЬ</button></div>` : ''}
                    <img src="${m.img}">
                    <div class="card-info"><b>${esc(m.name)}</b><br><small>${esc(m.role)}</small></div>
                `;
                if(isAdmin) {
                    el.ondragstart = (e) => { draggedItemId = m.id; el.classList.add('dragging'); };
                    el.ondragend = () => el.classList.remove('dragging');
                    el.ondragover = (e) => e.preventDefault();
                    el.ondrop = (e) => handleMemberDrop(m.id);
                }
                grid.appendChild(el);
            });
            wrapper.appendChild(grid);
        }

        async function handleMemberDrop(targetId) {
            if(draggedItemId === targetId) return;
            const snap = await getDocs(query(collection(db, "team"), orderBy("index", "asc")));
            let list = snap.docs.map(d => ({id:d.id, ...d.data()}));
            
            const dragIdx = list.findIndex(x => x.id === draggedItemId);
            const dropIdx = list.findIndex(x => x.id === targetId);
            
            const [reorderedItem] = list.splice(dragIdx, 1);
            list.splice(dropIdx, 0, reorderedItem);

            const batch = writeBatch(db);
            list.forEach((item, i) => {
                batch.update(doc(db, "team", item.id), { index: i });
            });
            await batch.commit();
            loadTeam();
        }

        window.deleteTM = async (id) => {
            if(confirm("Удалить участника?")) { await deleteDoc(doc(db, "team", id)); loadTeam(); }
        };

        // --- АЧИВКИ ---
        window.openAchInventory = () => {
            const list = document.getElementById('ach-inv-list'); list.innerHTML = '';
            (userData.achievements || []).forEach((a, i) => {
                list.innerHTML += `<div onclick="viewAch(${i})" style="font-size:30px; cursor:pointer; background:var(--input-bg); padding:10px; border-radius:10px; text-align:center; border:1px solid ${a.hidden?'transparent':'var(--accent)'}">${a.img}</div>`;
            });
            document.getElementById('m-ach-inv').style.display = 'flex';
        };

        window.viewAch = (i) => {
            const a = userData.achievements[i];
            document.getElementById('ach-v-img').innerText = a.img;
            document.getElementById('ach-v-name').innerText = a.name;
            document.getElementById('ach-v-desc').innerText = a.desc;
            document.getElementById('ach-v-meta').innerText = `Выдано: ${a.issuedBy || 'Система'}`;
            
            const btnToggle = document.getElementById('btn-ach-toggle');
            btnToggle.innerText = a.hidden ? "Показать в профиле" : "Скрыть из профиля";
            btnToggle.onclick = () => toggleAch(i);

            document.getElementById('btn-ach-del').onclick = () => deleteAch(i);
            
            document.getElementById('m-ach-inv').style.display = 'none';
            document.getElementById('m-ach-view').style.display = 'flex';
        };

        async function toggleAch(idx) {
            userData.achievements[idx].hidden = !userData.achievements[idx].hidden;
            await updateDoc(doc(db, "users", auth.currentUser.uid), { achievements: userData.achievements });
            location.reload();
        }

        async function deleteAch(idx) {
            if(confirm("Удалить ачивку навсегда?")) {
                userData.achievements.splice(idx, 1);
                await updateDoc(doc(db, "users", auth.currentUser.uid), { achievements: userData.achievements });
                location.reload();
            }
        }

        window.giveAch = async () => {
            const email = document.getElementById('ga-uid').value;
            const snap = await getDocs(query(collection(db, "users"), where("email", "==", email)));
            if(snap.empty) return showToast("User not found", "error");
            
            const newAch = {
                name: document.getElementById('ga-name').value,
                desc: document.getElementById('ga-desc').value,
                img: document.getElementById('ga-img').value,
                hidden: false, issuedBy: userData.nickname, date: Date.now()
            };
            await updateDoc(doc(db, "users", snap.docs[0].id), { achievements: arrayUnion(newAch) });
            showToast("Выдано!"); closeModals();
        };

        // --- AUTH ---
        onAuthStateChanged(auth, async (u) => {
            if(u) {
                const d = await getDoc(doc(db, "users", u.uid)); userData = d.data();
                isAdmin = userData.role === 'admin';
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('user-ui').style.display = 'block';
                
                document.getElementById('u-nick').innerText = userData.nickname;
                document.getElementById('u-ava').src = userData.avatar || 'https://api.dicebear.com/7.x/identicon/svg';
                document.getElementById('u-role').innerText = isAdmin ? "АДМИНИСТРАТОР" : "ПОЛЬЗОВАТЕЛЬ";
                document.getElementById('u-views').innerText = userData.views || 0;
                document.getElementById('u-subs').innerText = userData.subscribers || 0;
                
                const achBox = document.getElementById('u-ach'); achBox.innerHTML = '';
                (userData.achievements || []).forEach(a => {
                    if(!a.hidden) achBox.innerHTML += `<div title="${a.name}" style="font-size:30px;">${a.img}</div>`;
                });
                if(isAdmin) {
                    document.getElementById('adm-btn-rel').style.display = 'block';
                    document.getElementById('adm-btn-team').style.display = 'block';
                    document.getElementById('adm-ach-panel').style.display = 'block';
                }
            } else {
                document.getElementById('auth-ui').style.display = 'block';
            }
            navigate(window.location.hash.replace('#','') || 'home', false);
        });

        document.getElementById('btn-login').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());
        document.getElementById('btn-reg').onclick = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            const r = await createUserWithEmailAndPassword(auth, e, p);
            await setDoc(doc(db, "users", r.user.uid), { email: e, nickname: e.split('@')[0], role: "user", achievements: [], views: 0, subscribers: 0, subscribersList: [] });
            location.reload();
        };
    </script>
</body>
</html>
